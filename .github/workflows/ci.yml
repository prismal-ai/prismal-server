name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.7"

jobs:
  unit:
    name: lint · type · unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The engine (prismal-ai) requires Python >=3.13.
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install (dev)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src

      - name: pytest (unit — no live provider I/O)
        run: uv run pytest -m "not contract"

  contract:
    name: contract (opt-in, released engine)
    runs-on: ubuntu-latest
    # Opt-in: runs on demand or on main, not on every PR. Exercises a released
    # `prismal` engine to catch host/engine drift (SPEC-RHB-NFR-003, ADR-005).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        # The engine (prismal-ai) requires Python >=3.13, so the contract job
        # (which installs the real engine) must match — 3.12 fails to resolve.
        run: uv python install 3.13

      - name: Create venv and install (dev)
        run: |
          uv venv --python 3.13
          uv pip install -e ".[dev]"

      - name: pytest (contract — against released prismal)
        run: uv run pytest -m contract
