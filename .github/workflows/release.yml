name: Release

# Cut a release by pushing a semver tag (e.g. `v0.1.0`). This builds and
# publishes the container image to GHCR, drafts a GitHub Release, and — when a
# PyPI token is configured — publishes the sdist/wheel. The image is the primary
# artifact (ADR: single stateless container); PyPI is optional.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_VERSION: "0.11.7"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Gate the release on a green lint/type/unit run before publishing anything.
  verify:
    name: verify (lint · type · unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install (dev)
        run: |
          uv venv --python 3.13
          uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check . && uv run ruff format --check .
      - name: mypy
        run: uv run mypy src
      - name: pytest (unit)
        run: uv run pytest -m "not contract"

  image:
    name: build & push image (GHCR)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          # Tag the image with the semver, its major.minor, and `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pypi:
    name: publish sdist/wheel (PyPI, optional)
    needs: verify
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC) — no long-lived token needed.
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        # Skips cleanly if the environment/publisher isn't configured yet.
        continue-on-error: true
        run: uv publish

  release:
    name: draft GitHub Release
    needs: [image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
